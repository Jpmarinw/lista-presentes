<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Minha Lista de Presentes</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="container">
            <header>
                <h1>🎁 Minha Lista de Presentes</h1>
                <p class="subtitle">Coisinhas que eu gostaria de ganhar 💝</p>
            </header>

            <main>
                <div id="loading" class="loading">
                    <p>Carregando lista...</p>
                </div>

                <div id="error" class="error" style="display: none">
                    <p>
                        Ops! Não foi possível carregar a lista. Verifique a
                        configuração da planilha.
                    </p>
                </div>

                <div
                    id="tabs-container"
                    class="tabs-container"
                    style="display: none"
                >
                    <div id="tabs-header" class="tabs-header"></div>
                </div>

                <div id="lista-presentes" class="lista"></div>
            </main>

            <footer>
                <p>Feito com 💜 para você</p>
            </footer>
        </div>

        <script src="script.js"></script>
    </body>
</html>
